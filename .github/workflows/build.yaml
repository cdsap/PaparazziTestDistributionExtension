name: build

on: [push, pull_request]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  lib-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Library Tests
        run: ./gradlew :lib:test

      - name: Run Paparazzi Compatibility Tests
        run: ./gradlew :lib:testPaparazziCompatAll

      - name: Run Gradle Plugin Unit Tests
        run: ./gradlew :gradle-plugin:test

      - name: Run Gradle Plugin Functional Tests
        run: ./gradlew :gradle-plugin:functionalTest

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-lib
          path: |
            lib/build/reports/tests/
            gradle-plugin/build/reports/tests/

  integration-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "AGP 8.13 + Paparazzi alpha02"
            slug: agp8
            project-dir: "integration-test/agp8"
          - name: "AGP 9.0 + Paparazzi alpha04"
            slug: agp9
            project-dir: "integration-test/agp9"

    runs-on: ubuntu-latest
    name: "integration (${{ matrix.name }})"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish plugin and library to Maven Local
        run: ./gradlew :lib:publishToMavenLocal :gradle-plugin:publishToMavenLocal

      - name: Run integration test (resolve from Maven Local)
        working-directory: ${{ matrix.project-dir }}
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GE_TMP_KEY }}
        run: |
          set -euo pipefail

          echo "::group::Default tdPaparazzi.inputReportDir"
          ./gradlew :app:recordPaparazziDebug --stacktrace
          ../../scripts/verify-paparazzi-td-merge.sh \
            app/build/reports/paparazzi \
            app/build/reports/paparazzi-td
          echo "::endgroup::"

          echo "::group::Custom tdPaparazzi.inputReportDir (validates paparazzi.td.report.dir wiring on TD agents)"
          # cleanupTdDirectories defaults to false, so the first run leaves td-* under
          # the default path. Wipe them before the override run so we can assert below
          # that the writer respected the new inputReportDir.
          rm -rf app/build/reports/paparazzi/td-*

          ./gradlew :app:recordPaparazziDebug \
            -PtdInputReportDir=build/td-paparazzi-custom-input \
            -PtdOutputReportDir=build/td-paparazzi-custom-output \
            --rerun-tasks --stacktrace
          ../../scripts/verify-paparazzi-td-merge.sh \
            app/build/td-paparazzi-custom-input \
            app/build/td-paparazzi-custom-output

          # The override must actually relocate the writer's output. If td-* still
          # appear under the default path, the system property never reached the agents.
          if compgen -G "app/build/reports/paparazzi/td-*" > /dev/null; then
            echo "::error::Custom inputReportDir was set, but td-* dirs still appeared under app/build/reports/paparazzi — paparazzi.td.report.dir wiring is broken."
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload merged TD Paparazzi report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-td-${{ matrix.slug }}
          path: |
            ${{ matrix.project-dir }}/app/build/reports/paparazzi-td/
            ${{ matrix.project-dir }}/app/build/td-paparazzi-custom-output/
          if-no-files-found: ignore
